
<div class="relative overflow-hidden">

  <!-- Background Glow -->
  <div class="absolute inset-0 -z-10">

    <!-- gradient base -->
    <div class="absolute inset-0 
                bg-linear-to-br from-[#0b0f1a] via-[#0f172a] to-[#020617]">
    </div>

    <!-- pink glow -->
    <div class="absolute top-[-20%] left-[-10%] w-125 h-125 
                bg-rose-500/20 blur-[120px] rounded-full">
    </div>

    <!-- purple glow -->
    <div class="absolute bottom-[-20%] right-[-10%] w-125 h-125 
                bg-purple-500/20 blur-[120px] rounded-full">
    </div>

  </div>
<section class="relative overflow-hidden py-24 px-6 text-white">

  <!-- Background Glow -->
  <div class="absolute inset-0 -z-10">
    <div class="absolute top-[-20%] left-[-10%] w-100 h-100 bg-rose-500/20 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-100 h-100 bg-purple-500/20 blur-[120px] rounded-full"></div>
  </div>

  <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">

    <!-- LEFT TEXT -->
    <div>
      <h2 class="text-4xl md:text-5xl font-bold mb-6">
        Request a Demo
      </h2>

      <p class="text-white/60 mb-6">
        See how our platform transforms your media workflow with real-time insights and automation.
      </p>

      <ul class="space-y-3 text-white/70 text-sm">
        <li>✔ Personalized walkthrough</li>
        <li>✔ Live platform preview</li>
        <li>✔ Expert consultation</li>
      </ul>
    </div>

    <!-- FORM -->
    <div class="animate-slide-left">

      <form class="group relative p-8 rounded-3xl 
                   bg-white/5 backdrop-blur-md border border-white/10
                   shadow-lg transition-all duration-500
                   hover:shadow-[0_0_60px_rgba(244,63,94,0.4)]">

        <!-- glow -->
        <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition
                    bg-linear-to-br from-rose-500/20 via-pink-500/10 to-transparent blur-2xl">
        </div>

        <div class="relative z-10 space-y-5">

          <!-- Name -->
          <input type="text" placeholder="Full Name"
            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 
                   text-white placeholder-white/50 focus:outline-none 
                   focus:border-rose-400 transition">

          <!-- Email -->
          <input type="email" placeholder="Email Address"
            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 
                   text-white placeholder-white/50 focus:outline-none 
                   focus:border-pink-400 transition">

          <!-- Company -->
          <input type="text" placeholder="Company Name"
            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 
                   text-white placeholder-white/50 focus:outline-none 
                   focus:border-purple-400 transition">

          <!-- Message -->
          <textarea rows="4" placeholder="Tell us about your needs..."
            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 
                   text-white placeholder-white/50 focus:outline-none 
                   focus:border-rose-400 transition"></textarea>

          <!-- Button -->
          <button type="submit"
            class="w-full py-3 rounded-xl font-semibold
                   bg-linear-to-r from-rose-500 to-pink-500
                   hover:scale-[1.02] transition shadow-lg">
            Submit Request
          </button>

        </div>

      </form>

    </div>

  </div>

</section>

  </div>
